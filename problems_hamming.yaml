problems:
  - id: hamming_bound_core
    tags: [coding_theory, hamming_bound]
    hint: |
      Prove the core inequality form of Hamming bound.
      Use this skeleton:
        have hvol_pos : 0 < hammingBallVolume q n ((d - 1) / 2) := by
          exact hamming_ball_volume_pos q n ((d - 1) / 2)
        exact (Nat.le_div_iff_mul_le hvol_pos).2 hpack
    formal_statement: |
      import Mathlib
      /-
      Hamming ball volume for radius t in q-ary ambient space.
      -/
      def hammingBallVolume (q n t : Nat) : Nat :=
        (Finset.range (t + 1)).sum (fun i => Nat.choose n i * (q - 1) ^ i)

      /-
      The volume is always positive (the i = 0 term is 1).
      -/
      lemma hamming_ball_volume_pos (q n t : Nat) : 0 < hammingBallVolume q n t := by
        unfold hammingBallVolume
        let f : Nat → Nat := fun i => Nat.choose n i * (q - 1) ^ i
        have h0 : (0 : Nat) ∈ Finset.range (t + 1) := by
          simp
        have hle :
            f 0 ≤ (Finset.range (t + 1)).sum f := by
          exact Finset.single_le_sum (fun i hi => Nat.zero_le (f i)) h0
        have hone : f 0 = 1 := by
          simp [f]
        have hge1 :
            1 ≤ (Finset.range (t + 1)).sum f := by
          simpa [hone] using hle
        exact lt_of_lt_of_le Nat.zero_lt_one hge1

      /-
      Core Hamming bound form:
      If code size A times ball volume is at most q^n, then A is bounded by the quotient.
      This is the final arithmetic step after sphere-packing.
      -/
      theorem hamming_bound_core (A q n d : Nat)
          (hpack : A * hammingBallVolume q n ((d - 1) / 2) ≤ q ^ n) :
          A ≤ q ^ n / hammingBallVolume q n ((d - 1) / 2) := by
        sorry
