problems:
  - id: hamming_bound_core_real_loop
    tags: [coding_theory, hamming_bound, real_loop]
    formal_statement: |
      import Mathlib

      /-
      q-ary Hamming ball volume with radius t.
      -/
      def hammingBallVolume (q n t : Nat) : Nat :=
        (Finset.range (t + 1)).sum (fun i => Nat.choose n i * (q - 1) ^ i)

      /-
      The volume is positive because the i=0 term contributes 1.
      -/
      lemma hamming_ball_volume_pos (q n t : Nat) : 0 < hammingBallVolume q n t := by
        unfold hammingBallVolume
        let f : Nat → Nat := fun i => Nat.choose n i * (q - 1) ^ i
        have h0 : (0 : Nat) ∈ Finset.range (t + 1) := by
          simp
        have hle : f 0 ≤ (Finset.range (t + 1)).sum f := by
          exact Finset.single_le_sum (fun i hi => Nat.zero_le (f i)) h0
        have hone : f 0 = 1 := by
          simp [f]
        have hge1 : 1 ≤ (Finset.range (t + 1)).sum f := by
          simpa [hone] using hle
        exact lt_of_lt_of_le Nat.zero_lt_one hge1

      /-
      Core arithmetic step used in Hamming bound.
      -/
      theorem hamming_bound_core_real_loop (A q n d : Nat)
          (hpack : A * hammingBallVolume q n ((d - 1) / 2) ≤ q ^ n) :
          A ≤ q ^ n / hammingBallVolume q n ((d - 1) / 2) := by
        sorry
